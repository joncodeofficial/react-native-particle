name: Setup
description: Setup Node.js and install dependencies

runs:
  using: composite
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version-file: .nvmrc
        cache: yarn

    - name: Restore node_modules
      id: node-modules-cache
      uses: actions/cache/restore@v4
      with:
        path: |
          node_modules
          example/node_modules
        key: ${{ runner.os }}-node-modules-${{ hashFiles('yarn.lock') }}-${{ hashFiles('package.json', 'example/package.json') }}
        restore-keys: |
          ${{ runner.os }}-node-modules-${{ hashFiles('yarn.lock') }}
          ${{ runner.os }}-node-modules-

    - name: Install dependencies
      if: steps.node-modules-cache.outputs.cache-hit != 'true'
      run: |
        yarn install --frozen-lockfile
        yarn install --frozen-lockfile --cwd example
      shell: bash

    - name: Save node_modules cache
      if: steps.node-modules-cache.outputs.cache-hit != 'true'
      uses: actions/cache/save@v4
      with:
        path: |
          node_modules
          example/node_modules
        key: ${{ steps.node-modules-cache.outputs.cache-primary-key }}
